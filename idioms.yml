  - idiom: "avoir faim"
    literal: "to have hunger"
    meaning: "to be hungry"
    difficulty: 5
    frequency: 1
    context: "general"
    register: "neutral"
    category: "basic needs"
    examples:
      a:
        french: "J'ai faim."
        english: "I'm hungry."
      b:
        french: "Les enfants ont toujours faim après l'école."
        english: "The children are always hungry after school."
      c:
        french: "Bien que nous ayons dîné il y a deux heures, j'ai de nouveau faim."
        english: "Although we dined two hours ago, I'm hungry again."

